<header class="header">

</header>


<!-- =========================================================

========================================================= -->

<section class="quiz-box">

    <!-- INFO -->

    <div class="info-grid">

        <div class="info-card">

            </h3>

            <p>

            </p>

            </p>

        </div>

        <div class="info-card">

            </h3>

            </p>

        <button class="runtime-btn"
                onclick="previousQuiz()">

            ← Previous Quiz

        </button>

                onclick="skipQuestion()">

            Skip Question

        </button>

                onclick="submitQuiz()">

            Submit Quiz ✓

        </button>

<!-- =========================================================
     SCRIPT
========================================================= -->

<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let user =
    JSON.parse(
        localStorage.getItem(
            "ActiveQuizzoneUser"
        )
    );

if(!user){

    alert("Please login first!");

    location.href =
        "/Quizzone/Home/SignIn.htm";

}


/* =========================================================
   QUESTIONS
========================================================= */

const questions = [

{
q:"Which category of numbers includes both rational and irrational numbers together on the mathematical number line system?",
opt:[
"Natural Numbers",
"Whole Numbers",
"Real Numbers",
"Prime Numbers"
],
ans:2
},

{
q:"Why are rational numbers considered important in mathematics and scientific calculations involving measurable quantities?",
opt:[
"They cannot be represented in fraction form",
"They are always imaginary values",
"They can be represented as fractions of integers",
"They exist only in geometry"
],
ans:2
},

{
q:"Which statement correctly describes irrational numbers in advanced mathematical representation systems?",
opt:[
"They terminate after a few digits",
"They repeat continuously",
"They are non-terminating and non-repeating",
"They are always negative integers"
],
ans:2
},

{
q:"Which of the following values is classified as an irrational number in mathematics?",
opt:[
"5/2",
"0.75",
"π",
"4"
],
ans:2
},

{
q:"How do real numbers help students understand coordinate geometry and graphical mathematical systems?",
opt:[
"They remove graphical representation",
"They represent measurable points on number lines",
"They eliminate calculations",
"They only represent fractions"
],
ans:1
},

{
q:"Which field heavily depends on real numbers for accurate calculations, measurements, and analytical problem solving?",
opt:[
"Engineering",
"Physics",
"Computer Science",
"All of the Above"
],
ans:3
},

{
q:"What is the major difference between rational and irrational numbers?",
opt:[
"Rational numbers repeat or terminate while irrational numbers do not",
"Irrational numbers are always integers",
"Rational numbers are always negative",
"There is no difference"
],
ans:0
},

{
q:"Why is understanding real numbers considered foundational for advanced mathematics and analytical sciences?",
opt:[
"They simplify only basic counting",
"They help build concepts used in algebra, calculus and geometry",
"They eliminate equations completely",
"They are used only in financial systems"
],
ans:1
}

];


/* =========================================================
   VARIABLES
========================================================= */

let index = 0;

let score = 0;

let questionSeconds = 30;

let totalSeconds = 240;

let questionTimer;

let overallTimer;


/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){

    resetQuestionTimer();

    document.getElementById(
        "questionNumber"
    ).innerText =

        `Question ${index + 1} / ${questions.length}`;

    document.getElementById(
        "questionText"
    ).innerText =

        questions[index].q;

    let html = "";

    questions[index].opt.forEach((o,i)=>{

        html += `

        <div class='option'
             onclick='checkAnswer(${i})'>

             ${o}

        </div>

        `;

    });

    document.getElementById(
        "options"
    ).innerHTML = html;

}


/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(i){

    if(i === questions[index].ans){

        score += 4;

    }

    else{

        score -= 1;

    }

    updateScore();

    nextQuestion();

}


/* =========================================================
   NEXT QUESTION
========================================================= */

function nextQuestion(){

    clearInterval(questionTimer);

    index++;

    if(index >= questions.length){

        submitQuiz();

        return;

    }

    loadQuestion();

}


/* =========================================================
   SKIP
========================================================= */

function skipQuestion(){

    nextQuestion();

}


/* =========================================================
   SCORE UPDATE
========================================================= */

function updateScore(){

    document.getElementById(
        "scoreBox"
    ).innerText = score;

}


/* =========================================================
   QUESTION TIMER
========================================================= */

function resetQuestionTimer(){

    clearInterval(questionTimer);

    questionSeconds = 30;

    document.getElementById(
        "questionTimer"
    ).innerText =
        questionSeconds + "s";

    document.getElementById(
        "progressBar"
    ).style.animation =
        "none";

    void document.getElementById(
        "progressBar"
    ).offsetWidth;

    document.getElementById(
        "progressBar"
    ).style.animation =
        "moveProgress 30s linear forwards";

    questionTimer = setInterval(()=>{

        questionSeconds--;

        document.getElementById(
            "questionTimer"
        ).innerText =
            questionSeconds + "s";

        if(questionSeconds <= 0){

            nextQuestion();

        }

    },1000);

}


/* =========================================================
   OVERALL TIMER
========================================================= */

overallTimer = setInterval(()=>{

    totalSeconds--;

    document.getElementById(
        "overallTimer"
    ).innerText =
        totalSeconds + "s";

    if(totalSeconds <= 0){

        submitQuiz();

    }

},1000);


/* =========================================================
   SUBMIT QUIZ
========================================================= */

function submitQuiz(){

    clearInterval(questionTimer);

    clearInterval(overallTimer);

    let percentage =

        (
            (
                score /
                (questions.length * 4)
            ) * 100
        ).toFixed(1);

    document.querySelector(
        ".quiz-box"
    ).innerHTML = `

        <div class='result-box'>

            <h1>
                Quiz Completed 🎉
            </h1>

            <h2>
                Score : ${score}
            </h2>

            <h3>
                Percentage : ${percentage}%
            </h3>

            <p>
                Your Real Numbers understanding
                was analyzed using Quizzone
                Smart Runtime Engine.
            </p>

            <button class='runtime-btn'
                    onclick='saveScore()'>

                Save Score & Continue →

            </button>

        </div>

    `;

}


/* =========================================================
   SAVE SCORE
========================================================= */

function saveScore(){

    let user =
        JSON.parse(
            localStorage.getItem(
                "ActiveQuizzoneUser"
            )
        );

    if(!user){

        return;

    }

    user.scores =
        user.scores || {};

    user.scores.math_ch1_quiz2 = {

        marks : score,

        submitted :
            new Date(),

        total :
            questions.length * 4

    };

    localStorage.setItem(

        "ActiveQuizzoneUser",

        JSON.stringify(user)

    );

    let allUsers =
        JSON.parse(
            localStorage.getItem(
                "QuizzoneUsersDB"
            )
        ) || [];

    let idx =
        allUsers.findIndex(
            x=>x.email===user.email
        );

    if(idx !== -1){

        allUsers[idx] = user;

    }

    localStorage.setItem(

        "QuizzoneUsersDB",

        JSON.stringify(allUsers)

    );
    window.location.href="/Quizzone/Disciplines/Mathematics/Quizes/Chapter%201/Topic3.htm"
    autoNextQuiz();

}


/* =========================================================
   AUTO NEXT QUIZ
========================================================= */

function autoNextQuiz(){

    const currentPath =
        window.location.pathname;

    const match =
        currentPath.match(/Topic(\d+)\.htm/i);

    if(!match){

        window.location.href =
            "/Quizzone/index.htm";

        return;

    }

    const currentQuiz =
        parseInt(match[1]);

    const nextQuiz =
        currentQuiz + 1;

    const nextQuizFile =
        `Topic${nextQuiz}.htm`;

    fetch(nextQuizFile)

    .then(response=>{

        if(response.ok){

            setTimeout(()=>{

                window.location.href =
                    nextQuizFile;

            },3000);

        }

        else{

            showCompletionPage();

        }

    })

    .catch(()=>{

        showCompletionPage();

    });

}


/* =========================================================
   FINAL COMPLETION
========================================================= */

function showCompletionPage(){

    document.body.innerHTML = `

        <div style='
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                linear-gradient(
                    135deg,
                    #007bff,
                    #00d4ff
                );
            font-family:Poppins;
            color:white;
            text-align:center;
            padding:20px;
        '>

            <div>

                <h1 style='font-size:60px;'>

                    🎉

                </h1>

                <h2>

                    Chapter Completed Successfully

                </h2>

                <p>

                    You completed all quizzes
                    of Mathematics Chapter 1.

                </p>

                <button onclick='goHome()'

                    style='
                        padding:14px 24px;
                        border:none;
                        border-radius:50px;
                        background:white;
                        color:#007bff;
                        font-weight:700;
                        cursor:pointer;
                    '>

                    Go To Home

                </button>

            </div>

        </div>

    `;

}


/* =========================================================
   GO HOME
========================================================= */

function goHome(){

    window.location.href =
        "/Quizzone/index.htm";

}

/* =========================================================
   PREVIOUS QUIZ
========================================================= */

function previousQuiz(){

    history.back();

}


/* =========================================================
   PAGE VALIDATION
========================================================= */

fetch(window.location.href)

.then(res=>{

    if(!res.ok){

        location.href =
            "/Quizzone/404.html";

    }

})

.catch(()=>{

    location.href =
        "/Quizzone/404.html";

});


/* =========================================================
   RUNTIME TITLE
========================================================= */

document.title =
    "Mathematics Quiz Topic 2 | Quizzone";


/* =========================================================
   LOAD FIRST QUESTION
========================================================= */

loadQuestion();

</script>

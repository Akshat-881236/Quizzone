========================================================= */

:root{

    --primary:#007bff;
    --secondary:#00d4ff;

/* =========================================================

/* =========================================================

    background:

    color:white;

    padding:20px;

    position:sticky;

    top:0;

    z-index:1000;

    box-shadow:

}


.header-title{

    font-size:1.7rem;

    font-weight:700;

}

    opacity:.92;

}


/* =========================================================

========================================================= */

.quiz-box{

    width:92%;

    max-width:1050px;

    margin:30px auto;

    background:

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:35px;

    box-shadow:
        0 8px 25px rgba(0,0,0,.12);

}


/* =========================================================

    display:flex;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

}


.info-card{

    flex:1;

    min-width:180px;

    background:white;

    border-radius:18px;

    padding:18px;

    text-align:center;

    box-shadow:
        0 2px 12px rgba(0,0,0,.08);

}


.info-card h3{

    margin:0;

    color:#007bff;

}


/* =========================================================
   QUESTION BOX
========================================================= */

.question-box{

    background:white;

    padding:28px;

    border-radius:20px;

    box-shadow:
        0 2px 12px rgba(0,0,0,.08);

}


.question-number{

    color:#007bff;

    font-weight:700;

    margin-bottom:12px;

}


.question-text{

    font-size:1.15rem;

    line-height:1.9;

    font-weight:500;

}


/* =========================================================
   OPTIONS
========================================================= */

.option{

    background:#eef4ff;

    padding:18px;

    margin-top:15px;

    border-radius:14px;

    cursor:pointer;

    transition:.3s;

    border:
        2px solid transparent;

}


.option:hover{

    background:#dce8ff;

    border-color:#007bff;

    transform:translateY(-2px);

}

.progress{

/* =========================================================

<body>

<!-- =========================================================
     HEADER
========================================================= -->

<header class="header">

    <div class="header-title">

        Mathematics → Chapter 1 → Quiz Topic 4

    </div>

    <div class="header-sub">

        Rational Numbers Smart Quiz Runtime

    </div>

</header>


<!-- =========================================================
     QUIZ BOX
========================================================= -->

<section class="quiz-box">

    <!-- INFO -->

    <div class="info-grid">

        <div class="info-card">

            <h3 id="questionTimer">
                30s
            </h3>

            <p>
                Per Question Timer
            </p>

        </div>

        <div class="info-card">

            <h3 id="overallTimer">
                300s
            </h3>

            <p>
                Overall Quiz Time
            </p>

        </div>

        <div class="info-card">

            <h3 id="scoreBox">
                0
            </h3>

            <p>
                Current Score
            </p>

        </div>

    </div>


    <!-- QUESTION -->

    <div class="question-box">

        <div class="question-number"
             id="questionNumber">

            Question 1 / 10

        </div>

        <div class="question-text"
             id="questionText">

        </div>

        <div id="options"></div>

    </div>


    <!-- TIMER -->

    <div class="timer-area">

        <div class="progress">

            <div class="progress-bar
                        progress-bar-striped
                        progress-bar-animated
                        bg-info"

                 id="progressBar"
                 style="width:0%">

            </div>

        </div>

    </div>


    <!-- BUTTONS -->

    <div class="btn-area">

        <button class="runtime-btn"
                onclick="previousQuiz()">

            ← Previous Quiz

        </button>

        <button class="runtime-btn"
                onclick="skipQuestion()">

            Skip Question

        </button>

        <button class="runtime-btn"
                onclick="submitQuiz()">

            Submit Quiz ✓

        </button>

    </div>

</section>


<!-- =========================================================
     SCRIPT
========================================================= -->

<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let user =
    JSON.parse(
        localStorage.getItem(
            "ActiveQuizzoneUser"
        )
    );

if(!user){

    alert("Please login first!");

    location.href =
        "/Quizzone/Home/SignIn.htm";

}


/* =========================================================
   QUESTIONS
========================================================= */

const questions = [

{
q:"Which statement correctly defines a rational number in mathematics?",
opt:[
"A number that cannot be expressed as a fraction",
"A number expressible as p/q where q is not zero",
"A number having no decimal form",
"A number larger than infinity"
],
ans:1
},

{
q:"Why are rational numbers important in measurements and scientific calculations?",
opt:[
"They eliminate fractions",
"They provide accurate numerical representation",
"They only represent integers",
"They cannot represent decimals"
],
ans:1
},

{
q:"Which of the following is a rational number?",
opt:[
"√2",
"π",
"3/4",
"√5"
],
ans:2
},

{
q:"What type of decimal expansion is commonly associated with rational numbers?",
opt:[
"Only non repeating decimals",
"Only irrational patterns",
"Terminating or repeating decimals",
"Random decimals"
],
ans:2
},

{
q:"Which property allows rational numbers to be represented between integers?",
opt:[
"Fraction representation",
"Square root property",
"Negative infinity rule",
"Geometry theorem"
],
ans:0
},

{
q:"How can every integer be represented as a rational number?",
opt:[
"By dividing by zero",
"By writing it over one",
"By multiplying by infinity",
"By converting to irrational form"
],
ans:1
},

{
q:"Which rational number is represented by decimal value 0.25?",
opt:[
"1/2",
"1/3",
"1/4",
"3/2"
],
ans:2
},

{
q:"Rational numbers are highly used in computer systems because they help represent what?",
opt:[
"Precise data values",
"Only graphics",
"Only negative numbers",
"Only algebraic formulas"
],
ans:0
},

{
q:"Which of the following is NOT a rational number?",
opt:[
"5/6",
"-9/2",
"√7",
"0.75"
],
ans:2
},

{
q:"Why do students study rational numbers before algebra and advanced mathematics?",
opt:[
"To avoid equations",
"To build numerical and logical understanding",
"To eliminate decimal systems",
"To simplify geometry only"
],
ans:1
}

];


/* =========================================================
   VARIABLES
========================================================= */

let index = 0;

let score = 0;

let questionSeconds = 30;

let totalSeconds = 300;

let questionTimer;

let overallTimer;


/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){

    resetQuestionTimer();

    document.getElementById(
        "questionNumber"
    ).innerText =

        `Question ${index + 1} / ${questions.length}`;

    document.getElementById(
        "questionText"
    ).innerText =

        questions[index].q;

    let html = "";

    questions[index].opt.forEach((o,i)=>{

        html += `

        <div class='option'
             onclick='checkAnswer(${i})'>

             ${o}

        </div>

        `;

    });

    document.getElementById(
        "options"
    ).innerHTML = html;

}


/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(i){

    if(i === questions[index].ans){

        score += 4;

    }

    else{

        score -= 1;

    }

    updateScore();

    nextQuestion();

}


/* =========================================================
   NEXT QUESTION
========================================================= */

function nextQuestion(){

    clearInterval(questionTimer);

    index++;

    if(index >= questions.length){

        submitQuiz();

        return;

    }

    loadQuestion();

}


/* =========================================================
   SKIP
========================================================= */

function skipQuestion(){

    nextQuestion();

}


/* =========================================================
   UPDATE SCORE
========================================================= */

function updateScore(){

    document.getElementById(
        "scoreBox"
    ).innerText = score;

}


/* =========================================================
   QUESTION TIMER
========================================================= */

function resetQuestionTimer(){

    clearInterval(questionTimer);

    questionSeconds = 30;

    document.getElementById(
        "questionTimer"
    ).innerText =
        questionSeconds + "s";

    document.getElementById(
        "progressBar"
    ).style.animation =
        "none";

    void document.getElementById(
        "progressBar"
    ).offsetWidth;

    document.getElementById(
        "progressBar"
    ).style.animation =
        "progressMove 30s linear forwards";

    questionTimer = setInterval(()=>{

        questionSeconds--;

        document.getElementById(
            "questionTimer"
        ).innerText =
            questionSeconds + "s";

        if(questionSeconds <= 0){

            nextQuestion();

        }

    },1000);

}


/* =========================================================
   OVERALL TIMER
========================================================= */

overallTimer = setInterval(()=>{

    totalSeconds--;

    document.getElementById(
        "overallTimer"
    ).innerText =
        totalSeconds + "s";

    if(totalSeconds <= 0){

        submitQuiz();

    }

},1000);


/* =========================================================
   SUBMIT QUIZ
========================================================= */

function submitQuiz(){

    clearInterval(questionTimer);

    clearInterval(overallTimer);

    let percentage =

        (
            (
                score /
                (questions.length * 4)
            ) * 100
        ).toFixed(1);

    document.querySelector(
        ".quiz-box"
    ).innerHTML = `

        <div class='result-box'>

            <h1>
                Quiz Completed 🎉
            </h1>

            <h2>
                Score : ${score}
            </h2>

            <h3>
                Percentage : ${percentage}%
            </h3>

            <p>
                Rational Numbers performance
                analyzed successfully.

            </p>

            <button class='runtime-btn'
                    onclick='saveScore()'>

                Save Score & Continue →

            </button>

        </div>

    `;

}


/* =========================================================
   SAVE SCORE
========================================================= */

function saveScore(){

    let user =
        JSON.parse(
            localStorage.getItem(
                "ActiveQuizzoneUser"
            )
        );

    user.scores =
        user.scores || {};

    user.scores.math_ch1_quiz4 = {

        marks : score,

        total :
            questions.length * 4,

        submitted :
            new Date()

    };

    localStorage.setItem(

        "ActiveQuizzoneUser",

        JSON.stringify(user)

    );
    window.location.href="/Quizzone/Disciplines/Mathematics/Quizes/Chapter%201/Topic5.htm"
    autoNextQuiz();

}


/* =========================================================
   AUTO NEXT QUIZ
========================================================= */

function autoNextQuiz(){

    const currentPath =
        window.location.pathname;

    const match =
        currentPath.match(/Topic(\d+)\.htm/i);

    if(!match){

        location.href =
            "/Quizzone/index.htm";

        return;

    }

    const currentQuiz =
        parseInt(match[1]);

    const nextQuiz =
        currentQuiz + 1;

    const nextQuizFile =
        `Topic${nextQuiz}.htm`;

    fetch(nextQuizFile)

    .then(response=>{

        if(response.ok){

            setTimeout(()=>{

                location.href =
                    nextQuizFile;

            },3000);

        }

        else{

            showCompletionPage();

        }

    })

    .catch(()=>{

        showCompletionPage();

    });

}


/* =========================================================
   COMPLETION PAGE
========================================================= */

function showCompletionPage(){

    document.body.innerHTML = `

        <div style='
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                linear-gradient(
                    135deg,
                    #007bff,
                    #00d4ff
                );
            color:white;
            font-family:Poppins;
            text-align:center;
            padding:20px;
        '>

            <div>

                <h1>
                    🎉
                </h1>

                <h2>
                    All Available Quizzes Completed
                </h2>

                <button onclick='goHome()'

                    style='
                        padding:14px 24px;
                        border:none;
                        border-radius:50px;
                        background:white;
                        color:#007bff;
                        font-weight:700;
                        cursor:pointer;
                    '>

                    Go To Home

                </button>

            </div>

        </div>

    `;

}


/* =========================================================
   GO HOME
========================================================= */

function goHome(){

    location.href =
        "/Quizzone/index.htm";

}


/* =========================================================
   PREVIOUS QUIZ
========================================================= */

function previousQuiz(){

    history.back();

}


/* =========================================================
   PAGE VALIDATION
========================================================= */

fetch(window.location.href)

.then(res=>{

    if(!res.ok){

        location.href =
            "/Quizzone/404.html";

    }

})

.catch(()=>{

    location.href =
        "/Quizzone/404.html";

});


/* =========================================================
   LOAD FIRST QUESTION
========================================================= */

loadQuestion();

</script>

</body>

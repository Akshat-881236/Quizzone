<style>

:root{

    --primary:#007bff;
    --secondary:#00d4ff;
    --dark:#0d1117;

}

body{

    margin:0;

    font-family:'Poppins',sans-serif;

    background:
        linear-gradient(
            135deg,
            #eef4ff,
            #dce8ff
        );

    overflow-x:hidden;

}

.header{

    background:
        linear-gradient(
            135deg,
            #007bff,
            #00d4ff

    color:white;

    padding:20px;

    position:sticky;

    top:0;

    z-index:1000;

        0 4px 20px rgba(0,0,0,.15);

    font-size:1.7rem;

    font-weight:700;

}

.header-sub{

    opacity:.92;

}

.quiz-box{

    width:92%;

    max-width:1050px;

    margin:30px auto;

    background:
        rgba(255,255,255,.82);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:35px;

    box-shadow:
        0 8px 25px rgba(0,0,0,.12);

}

.info-grid{

    display:flex;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

}

.info-card{

    flex:1;

    min-width:180px;

    background:white;

    border-radius:18px;

    padding:18px;

    text-align:center;

    box-shadow:
        0 2px 12px rgba(0,0,0,.08);

}

.info-card h3{

    margin:0;

    color:#007bff;

}

.question-box{

    background:white;

    padding:28px;

    border-radius:20px;

    box-shadow:
        0 2px 12px rgba(0,0,0,.08);

}

.question-number{

    color:#007bff;

    font-weight:700;

    margin-bottom:12px;

}

.question-text{

    font-size:1.12rem;

    line-height:1.9;

    font-weight:500;

}

.option{

    background:#eef4ff;

    padding:18px;

    margin-top:15px;

    border-radius:14px;

    cursor:pointer;

    transition:.3s;

    border:
        2px solid transparent;

}

.option:hover{

    background:#dce8ff;

    border-color:#007bff;

    transform:translateY(-2px);

}

.timer-area{

    margin-top:25px;

}

.progress{

    height:14px;

    border-radius:50px;

}

.progress-bar{

    animation:
        progressMove 30s linear forwards;

}

@keyframes progressMove{

    from{
        width:0%;
    }

    to{
        width:100%;
    }

}

.btn-area{

    display:flex;

    justify-content:space-between;

    flex-wrap:wrap;

}

}

<body>

<header class="header">

    <div class="header-title">

        Mathematics → Chapter 2 → Quiz Topic 1

    </div>

    <div class="header-sub">

        Playing With Numbers Smart Quiz Runtime

    </div>

</header>


<section class="quiz-box">

    <div class="info-grid">

        <div class="info-card">

            <h3 id="questionTimer">
                30s
            </h3>

            <p>
                Per Question Timer
            </p>

        </div>

        <div class="info-card">

            <h3 id="overallTimer">
                300s
            </h3>

            <p>
                Overall Quiz Time
            </p>

        </div>

        <div class="info-card">

            <h3 id="scoreBox">
                0
            </h3>

            <p>
                Current Score
            </p>

        </div>

    </div>


    <div class="question-box">

        <div class="question-number"
             id="questionNumber">

            Question 1 / 10

        </div>

        <div class="question-text"
             id="questionText">

        </div>

        <div id="options"></div>

    </div>


    <div class="timer-area">

        <div class="progress">

            <div class="progress-bar
                        progress-bar-striped
                        progress-bar-animated
                        bg-info"

                 id="progressBar"
                 style="width:0%">

            </div>

        </div>

    </div>


    <div class="btn-area">

        <button class="runtime-btn"
                onclick="previousQuiz()">

            ← Previous Quiz

        </button>

        <button class="runtime-btn"
                onclick="skipQuestion()">

            Skip Question

        </button>

        <button class="runtime-btn"
                onclick="submitQuiz()">

            Submit Quiz ✓

        </button>

    </div>

</section>


<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

if(!user){

alert("Please login first!");

location.href =
"/Quizzone/Home/SignIn.htm";

}


/* =========================================================
   QUESTIONS
========================================================= */

const questions = [

{
q:"What is the main purpose of the chapter Playing With Numbers?",
opt:[
"To study only geometry",
"To understand properties and patterns of numbers",
"To learn drawing",
"To study only statistics"
],
ans:1
},

{
q:"Which concept is included in Playing With Numbers?",
opt:[
"Prime Numbers",
"Chemical Reactions",
"Human Anatomy",
"Photosynthesis"
],
ans:0
},

{
q:"What are factors of a number?",
opt:[
"Numbers that divide another number exactly",
"Numbers larger than infinity",
"Negative decimals only",
"Numbers without value"
],
ans:0
},

{
q:"Which of the following is a multiple of 5?",
opt:[
"13",
"17",
"20",
"23"
],
ans:2
},

{
q:"Why are divisibility rules useful?",
opt:[
"They simplify calculations and verification",
"They remove mathematics completely",
"They are only decorative",
"They increase calculation complexity"
],
ans:0
},

{
q:"Which of the following is a prime number?",
opt:[
"9",
"15",
"21",
"11"
],
ans:3
},

{
q:"How do prime numbers help in technology?",
opt:[
"They are used in encryption and cybersecurity",
"They stop internet connectivity",
"They replace calculators",
"They are used only in sports"
],
ans:0
},

{
q:"What mathematical skill improves through Playing With Numbers?",
opt:[
"Logical and analytical thinking",
"Only handwriting",
"Only memorization",
"Only drawing"
],
ans:0
},

{
q:"Which list correctly shows factors of 12?",
opt:[
"1,2,3,4,6,12",
"5,10,15",
"2,4,8,16",
"7,14,21"
],
ans:0
},

{
q:"Why is Playing With Numbers important for higher mathematics?",
opt:[
"It builds a strong foundation for advanced concepts",
"It removes need for calculations",
"It is unrelated to mathematics",
"It replaces algebra permanently"
],
ans:0
}

];


/* =========================================================
   VARIABLES
========================================================= */

let index = 0;

let score = 0;

let questionSeconds = 30;

let totalSeconds = 300;

let questionTimer;

let overallTimer;


/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){

resetQuestionTimer();

document.getElementById(
"questionNumber"
).innerText =

`Question ${index + 1} / ${questions.length}`;

document.getElementById(
"questionText"
).innerText =

questions[index].q;

let html = "";

questions[index].opt.forEach((o,i)=>{

html += `

<div class='option'
     onclick='checkAnswer(${i})'>

     ${o}

</div>

`;

});

document.getElementById(
"options"
).innerHTML = html;

}


/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(i){

if(i === questions[index].ans){

score += 4;

}

else{

score -= 1;

}

updateScore();

nextQuestion();

}


/* =========================================================
   NEXT QUESTION
========================================================= */

function nextQuestion(){

clearInterval(questionTimer);

index++;

if(index >= questions.length){

submitQuiz();

return;

}

loadQuestion();

}


/* =========================================================
   SKIP QUESTION
========================================================= */

function skipQuestion(){

nextQuestion();

}


/* =========================================================
   UPDATE SCORE
========================================================= */

function updateScore(){

document.getElementById(
"scoreBox"
).innerText = score;

}


/* =========================================================
   QUESTION TIMER
========================================================= */

function resetQuestionTimer(){

clearInterval(questionTimer);

questionSeconds = 30;

document.getElementById(
"questionTimer"
).innerText =
questionSeconds + "s";

document.getElementById(
"progressBar"
).style.animation =
"none";

void document.getElementById(
"progressBar"
).offsetWidth;

document.getElementById(
"progressBar"
).style.animation =
"progressMove 30s linear forwards";

questionTimer = setInterval(()=>{

questionSeconds--;

document.getElementById(
"questionTimer"
).innerText =
questionSeconds + "s";

if(questionSeconds <= 0){

nextQuestion();

}

},1000);

}


/* =========================================================
   OVERALL TIMER
========================================================= */

overallTimer = setInterval(()=>{

totalSeconds--;

document.getElementById(
"overallTimer"
).innerText =
totalSeconds + "s";

if(totalSeconds <= 0){

submitQuiz();

}

},1000);


/* =========================================================
   SUBMIT QUIZ
========================================================= */

function submitQuiz(){

clearInterval(questionTimer);

clearInterval(overallTimer);

let percentage =

(
(
score /
(questions.length * 4)
) * 100
).toFixed(1);

document.querySelector(
".quiz-box"
).innerHTML = `

<div class='result-box'>

<h1>
Quiz Completed 🎉
</h1>

<h2>
Score : ${score}
</h2>

<h3>
Percentage : ${percentage}%
</h3>

<p>
Playing With Numbers performance
analyzed successfully.
</p>

<button class='runtime-btn'
        onclick='saveScore()'>

Save Score & Continue →

</button>

</div>

`;

}


/* =========================================================
   SAVE SCORE
========================================================= */

function saveScore(){

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

user.scores =
user.scores || {};

user.scores.chapter2_topic1 = {

marks : score,

total :
questions.length * 4,

submitted :
new Date()

};

localStorage.setItem(

"ActiveQuizzoneUser",

JSON.stringify(user)

);
window.location.href="/Quizzone/Disciplines/Mathematics/Quizes/Chapter%202/Topic2.htm";
autoNextQuiz();

}


/* =========================================================
   AUTO NEXT QUIZ
========================================================= */

function autoNextQuiz(){

const currentPath =
window.location.pathname;

const match =
currentPath.match(/Topic(\d+)\.htm/i);

if(!match){

location.href =
"/Quizzone/index.htm";

return;

}

const currentQuiz =
parseInt(match[1]);

const nextQuiz =
currentQuiz + 1;

const nextQuizFile =
`Topic${nextQuiz}.htm`;

fetch(nextQuizFile)

.then(response=>{

if(response.ok){

setTimeout(()=>{

location.href =
nextQuizFile;

},3000);

}

else{

showCompletionPage();

}

})

.catch(()=>{

showCompletionPage();

});

}


/* =========================================================
   COMPLETION PAGE
========================================================= */

function showCompletionPage(){

document.body.innerHTML = `

<div style='
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#007bff,
#00d4ff
);
color:white;
font-family:Poppins;
text-align:center;
padding:20px;
'>

<div>

<h1>
🎉
</h1>

<h2>
All Available Quizzes Completed
</h2>

<button onclick='goHome()'

style='
padding:14px 24px;
border:none;
border-radius:50px;
background:white;
color:#007bff;
font-weight:700;
cursor:pointer;
'>

Go To Home

</button>

</div>

</div>

`;

}


/* =========================================================
   GO HOME
========================================================= */

function goHome(){

location.href =
"/Quizzone/index.htm";

}


/* =========================================================
   PREVIOUS QUIZ
========================================================= */

function previousQuiz(){

history.back();

}


/* =========================================================
   PAGE VALIDATION
========================================================= */

fetch(window.location.href)

.then(res=>{

if(!res.ok){

location.href =
"/Quizzone/404.html";

}

})

.catch(()=>{

location.href =
"/Quizzone/404.html";

});


/* =========================================================
   LOAD FIRST QUESTION
========================================================= */

loadQuestion();

</script>

</body>
</html>

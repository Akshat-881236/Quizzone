<style>

:root{

    --primary:#007bff;
    --secondary:#00d4ff;
    --light:#eef5ff;

}

body{

    margin:0;

    font-family:'Poppins',sans-serif;

    background:
        linear-gradient(
            135deg,
            #eef5ff,
            #d8e8ff
        );

    overflow-x:hidden;

}

.header{

    background:
        linear-gradient(
            135deg,
            #007bff,
            #00d4ff
        );

    color:white;

    padding:20px;

    box-shadow:
        0 4px 20px rgba(0,0,0,.15);

}

.header h1{

    margin:0;

    font-size:1.8rem;

}

.header p{

    margin-top:8px;

    opacity:.92;

}

.quiz-container{

    width:92%;

    max-width:1050px;

    margin:30px auto;

    background:
        rgba(255,255,255,.82);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:35px;

    box-shadow:
        0 8px 25px rgba(0,0,0,.12);

}

.info-grid{

    display:flex;

    flex-wrap:wrap;

    gap:18px;

    margin-bottom:30px;

}

.info-card{

    flex:1;

    min-width:180px;

    background:white;

    border-radius:18px;

    padding:20px;

    text-align:center;

    box-shadow:
        0 3px 14px rgba(0,0,0,.08);

}

.info-card h2{

    color:#007bff;

    margin:0;

}

.question-box{

    background:white;

    border-radius:20px;

    padding:28px;

    box-shadow:
        0 2px 12px rgba(0,0,0,.08);

}

.question-title{

    font-size:1.2rem;

    font-weight:600;

    line-height:1.8;

    margin-bottom:20px;

}

.option{

    padding:18px;

    background:#eef5ff;

    border-radius:14px;

    margin-top:15px;

    cursor:pointer;

    transition:.3s;

    border:
        2px solid transparent;

}

.option:hover{

    background:#d8e8ff;

    border-color:#007bff;

    transform:translateY(-2px);

}

.progress{

    height:14px;

    border-radius:50px;

    margin-top:25px;

}

.progress-bar{

    animation:
        timerAnimation 30s linear forwards;

}

@keyframes timerAnimation{

    from{
        width:0%;
    }

    to{
        width:100%;
    }

}

.control-buttons{

    display:flex;

    justify-content:space-between;

    flex-wrap:wrap;

    gap:15px;

    margin-top:35px;

}

.runtime-btn{

    border:none;

    padding:14px 24px;

    border-radius:50px;

    background:
        linear-gradient(
            135deg,
            #007bff,
            #00d4ff
        );

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.runtime-btn:hover{

    transform:translateY(-3px);

}

.result-box{

    text-align:center;

    padding:40px;

}

.result-box h1{

    color:#007bff;

}

@media(max-width:576px){

    .quiz-container{

        padding:20px;

    }

    .runtime-btn{

        width:100%;

    }

    .question-title{

        font-size:1rem;

    }

}

@media(min-width:2200px){

    body{

        zoom:1.4;

    }

}

</style>

</head>

<body>

<header class="header">

    <h1>

        Mathematics → Chapter 2 → Quiz Topic 2

    </h1>

    <p>

        Factors and Multiples Smart Quiz Runtime

    </p>

</header>


<section class="quiz-container">

    <div class="info-grid">

        <div class="info-card">

            <h2 id="questionTimer">
                30s
            </h2>

            <p>
                Question Timer
            </p>

        </div>

        <div class="info-card">

            <h2 id="overallTimer">
                300s
            </h2>

            <p>
                Overall Quiz Timer
            </p>

        </div>

        <div class="info-card">

            <h2 id="scoreBox">
                0
            </h2>

            <p>
                Current Score
            </p>

        </div>

    </div>


    <div class="question-box">

        <div id="questionNumber">

            Question 1 / 10

        </div>

        <div class="question-title"
             id="questionText">

        </div>

        <div id="options"></div>

    </div>


    <div class="progress">

        <div class="progress-bar
                    progress-bar-striped
                    progress-bar-animated
                    bg-info"

             id="progressBar"
             style="width:0%">

        </div>

    </div>


    <div class="control-buttons">

        <button class="runtime-btn"
                onclick="history.back()">

            ← Previous

        </button>

        <button class="runtime-btn"
                onclick="skipQuestion()">

            Skip →

        </button>

        <button class="runtime-btn"
                onclick="submitQuiz()">

            Submit Quiz ✓

        </button>

    </div>

</section>


<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

if(!user){

alert("Please login first!");

location.href =
"/Quizzone/Home/SignIn.htm";

}


/* =========================================================
   QUESTIONS
========================================================= */

const questions = [

{
q:"What is a factor in mathematics?",
opt:[
"A number that divides another number exactly",
"A random decimal value",
"A number greater than infinity",
"A number without value"
],
ans:0
},

{
q:"Which of the following is a factor of 18?",
opt:[
"5",
"7",
"9",
"11"
],
ans:2
},

{
q:"What are multiples of a number?",
opt:[
"Numbers obtained by repeated multiplication",
"Negative values only",
"Prime numbers only",
"Decimal fractions"
],
ans:0
},

{
q:"Which of the following is a multiple of 7?",
opt:[
"21",
"19",
"25",
"31"
],
ans:0
},

{
q:"Why are factors useful in mathematics?",
opt:[
"They help simplify fractions and equations",
"They remove calculations completely",
"They are unrelated to arithmetic",
"They only apply to geometry"
],
ans:0
},

{
q:"Which list correctly shows factors of 20?",
opt:[
"1,2,4,5,10,20",
"3,6,9,12",
"5,15,25",
"2,8,16"
],
ans:0
},

{
q:"What is a common factor?",
opt:[
"A factor shared by two or more numbers",
"A negative decimal number",
"A multiple greater than 100",
"A random arithmetic value"
],
ans:0
},

{
q:"Which of the following is a common factor of 12 and 18?",
opt:[
"5",
"6",
"11",
"13"
],
ans:1
},

{
q:"Why are multiples important in real life scheduling systems?",
opt:[
"They help synchronize repeated events",
"They stop mathematical operations",
"They reduce logical thinking",
"They only apply to sports"
],
ans:0
},

{
q:"How do factors and multiples help students?",
opt:[
"They improve analytical and problem solving skills",
"They remove mathematics completely",
"They reduce learning abilities",
"They only help in drawing"
],
ans:0
}

];


/* =========================================================
   VARIABLES
========================================================= */

let index = 0;

let score = 0;

let questionTime = 30;

let totalTime = 300;

let questionTimer;

let overallTimer;


/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){

resetQuestionTimer();

document.getElementById(
"questionNumber"
).innerText =

`Question ${index + 1} / ${questions.length}`;

document.getElementById(
"questionText"
).innerText =

questions[index].q;

let html = "";

questions[index].opt.forEach((option,i)=>{

html += `

<div class='option'
     onclick='checkAnswer(${i})'>

     ${option}

</div>

`;

});

document.getElementById(
"options"
).innerHTML = html;

}


/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(i){

if(i === questions[index].ans){

score += 4;

}

else{

score -= 1;

}

updateScore();

nextQuestion();

}


/* =========================================================
   NEXT QUESTION
========================================================= */

function nextQuestion(){

clearInterval(questionTimer);

index++;

if(index >= questions.length){

submitQuiz();

return;

}

loadQuestion();

}


/* =========================================================
   SKIP QUESTION
========================================================= */

function skipQuestion(){

nextQuestion();

}


/* =========================================================
   UPDATE SCORE
========================================================= */

function updateScore(){

document.getElementById(
"scoreBox"
).innerText = score;

}


/* =========================================================
   QUESTION TIMER
========================================================= */

function resetQuestionTimer(){

clearInterval(questionTimer);

questionTime = 30;

document.getElementById(
"questionTimer"
).innerText =
questionTime + "s";

document.getElementById(
"progressBar"
).style.animation =
"none";

void document.getElementById(
"progressBar"
).offsetWidth;

document.getElementById(
"progressBar"
).style.animation =
"timerAnimation 30s linear forwards";

questionTimer = setInterval(()=>{

questionTime--;

document.getElementById(
"questionTimer"
).innerText =
questionTime + "s";

if(questionTime <= 0){

nextQuestion();

}

},1000);

}


/* =========================================================
   OVERALL TIMER
========================================================= */

overallTimer = setInterval(()=>{

totalTime--;

document.getElementById(
"overallTimer"
).innerText =
totalTime + "s";

if(totalTime <= 0){

submitQuiz();

}

},1000);


/* =========================================================
   SUBMIT QUIZ
========================================================= */

function submitQuiz(){

clearInterval(questionTimer);

clearInterval(overallTimer);

let percentage =

(
(score / (questions.length * 4)) * 100
).toFixed(1);

document.querySelector(
".quiz-container"
).innerHTML = `

<div class='result-box'>

<h1>
Quiz Completed 🎉
</h1>

<h2>
Final Score : ${score}
</h2>

<h3>
Percentage : ${percentage}%
</h3>

<p>
Factors and Multiples performance
analysis completed successfully.
</p>

<button class='runtime-btn'
        onclick='saveScore()'>

Save Score & Continue →

</button>

</div>

`;

}


/* =========================================================
   SAVE SCORE
========================================================= */

function saveScore(){

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

user.scores =
user.scores || {};

user.scores.chapter2topic2 = {

marks : score,

submitted : new Date()

};

localStorage.setItem(

"ActiveQuizzoneUser",

JSON.stringify(user)

);
window.location.href="/Quizzone/Disciplines/Mathematics/Quizes/Chapter%202/Topic3.htm";
autoNextQuiz();

}


/* =========================================================
   AUTO NEXT QUIZ
========================================================= */

function autoNextQuiz(){

const currentPath =
window.location.pathname;

const match =
currentPath.match(/Topic(\d+)/i);

if(!match){

location.href =
"/Quizzone/index.htm";

return;

}

const currentQuiz =
parseInt(match[1]);

const nextQuiz =
currentQuiz + 1;

const nextFile =
`Topic${nextQuiz}.htm`;

fetch(nextFile)

.then(res=>{

if(res.ok){

setTimeout(()=>{

location.href =
nextFile;

},3000);

}

else{

showCompletionPage();

}

})

.catch(()=>{

showCompletionPage();

});

}


/* =========================================================
   COMPLETION PAGE
========================================================= */

function showCompletionPage(){

document.body.innerHTML = `

<div style='
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#007bff,
#00d4ff
);
color:white;
font-family:Poppins;
text-align:center;
padding:20px;
'>

<div>

<h1>
🎉
</h1>

<h2>
All Available Quizzes Completed
</h2>

<button onclick='goHome()'

style='
padding:14px 24px;
border:none;
border-radius:50px;
background:white;
color:#007bff;
font-weight:700;
cursor:pointer;
'>

Go To Home

</button>

</div>

</div>

`;

}


/* =========================================================
   GO HOME
========================================================= */

function goHome(){

location.href =
"/Quizzone/index.htm";

}


/* =========================================================
   PAGE VALIDATION
========================================================= */

fetch(window.location.href)

.then(res=>{

if(!res.ok){

location.href =
"/Quizzone/404.html";

}

})

.catch(()=>{

location.href =
"/Quizzone/404.html";

});


/* =========================================================
   INITIALIZE QUIZ
========================================================= */

loadQuestion();

</script>

</body>
</html>

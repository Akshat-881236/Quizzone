<style>

:root{

    --primary:#007bff;

body{

    margin:0;

        linear-gradient(

}

/* =========================================================

========================================================= */

.header{

    background:
        linear-gradient(

            #007bff,

    padding:22px;

    box-shadow:

    width:92%;

    max-width:1100px;

    margin:30px auto;

    background:
        rgba(255,255,255,.82);

    backdrop-filter:blur(18px);

    border-radius:26px;

    padding:38px;

    box-shadow:
        0 10px 28px rgba(0,0,0,.12);

}

/* =========================================================
   INFO GRID
========================================================= */

.info-grid{

    display:flex;

    flex-wrap:wrap;

    gap:18px;

    margin-bottom:30px;

}

.info-card{

    flex:1;

    min-width:180px;

    background:white;

    border-radius:18px;

    padding:20px;

    text-align:center;

    box-shadow:
        0 3px 14px rgba(0,0,0,.08);

}

.info-card h2{

    margin:0;

    color:#007bff;

}

/* =========================================================
   QUESTION BOX
========================================================= */

.question-box{

    background:white;

    border-radius:20px;

    padding:30px;

    box-shadow:
        0 3px 14px rgba(0,0,0,.08);

}

.question-number{

    color:#007bff;

    font-weight:700;

    margin-bottom:15px;

}

.question-title{

    font-size:1.15rem;

    font-weight:500;

    line-height:1.9;

}

.option{

    margin-top:15px;

    padding:18px;

    border-radius:14px;

    background:#eef5ff;

    cursor:pointer;

    transition:.3s;

    border:
        2px solid transparent;

}

.option:hover{

    background:#d8e8ff;

    border-color:#007bff;

    transform:translateY(-2px);

}

/* =========================================================
   TIMER
========================================================= */

.progress{

    height:14px;

    margin-top:25px;

    border-radius:50px;

}

.progress-bar{

    animation:
        progressMove 30s linear forwards;

}

@keyframes progressMove{

    from{
        width:0%;
    }

    to{

}

/* =========================================================

<body>

<header class="header">

    <h1>

        Mathematics → Chapter 2 → Quiz Topic 5

    </h1>

    <p>

        Divisibility Rules Smart Quiz Runtime

    </p>

</header>


<section class="quiz-container">

    <div class="info-grid">

        <div class="info-card">

            <h2 id="questionTimer">
                30s
            </h2>

            <p>
                Question Timer
            </p>

        </div>

        <div class="info-card">

            <h2 id="overallTimer">
                300s
            </h2>

            <p>
                Overall Quiz Timer
            </p>

        </div>

        <div class="info-card">

            <h2 id="scoreBox">
                0
            </h2>

            <p>
                Current Score
            </p>

        </div>

    </div>


    <div class="question-box">

        <div class="question-number"
             id="questionNumber">

            Question 1 / 10

        </div>

        <div class="question-title"
             id="questionText">

        </div>

        <div id="options"></div>

    </div>


    <div class="progress">

        <div class="progress-bar
                    progress-bar-striped
                    progress-bar-animated
                    bg-info"

             id="progressBar"
             style="width:0%">

        </div>

    </div>


    <div class="control-buttons">

        <button class="runtime-btn"
                onclick="history.back()">

            ← Previous

        </button>

        <button class="runtime-btn"
                onclick="skipQuestion()">

            Skip →

        </button>

        <button class="runtime-btn"
                onclick="submitQuiz()">

            Submit Quiz ✓

        </button>

    </div>

</section>


<script>

/* =========================================================
   LOGIN CHECK
========================================================= */

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

if(!user){

alert("Please login first!");

location.href =
"/Quizzone/Home/SignIn.htm";

}


/* =========================================================
   QUESTIONS
========================================================= */

const questions = [

{
q:"What are divisibility rules?",
opt:[
"Shortcuts to determine exact division",
"Methods to stop calculations",
"Decimal conversion rules",
"Negative number formulas"
],
ans:0
},

{
q:"A number is divisible by 2 if:",
opt:[
"It ends with an even digit",
"It ends with 5",
"It starts with 1",
"It contains decimals"
],
ans:0
},

{
q:"Which number is divisible by 5?",
opt:[
"243",
"678",
"125",
"777"
],
ans:2
},

{
q:"A number is divisible by 3 if:",
opt:[
"The last digit is 1",
"The sum of digits is divisible by 3",
"It is even",
"It contains zeros only"
],
ans:1
},

{
q:"Which of the following is divisible by 10?",
opt:[
"105",
"210",
"333",
"567"
],
ans:1
},

{
q:"Why are divisibility rules useful?",
opt:[
"They simplify calculations and save time",
"They remove arithmetic operations",
"They stop number analysis",
"They only work in geometry"
],
ans:0
},

{
q:"Which number is divisible by both 2 and 5?",
opt:[
"34",
"50",
"27",
"49"
],
ans:1
},

{
q:"A number divisible by 9 must:",
opt:[
"End with 9",
"Have digit sum divisible by 9",
"Always be odd",
"Contain decimal points"
],
ans:1
},

{
q:"Which divisibility rule applies to 245?",
opt:[
"Divisible by 5",
"Divisible by 2",
"Divisible by 4",
"Divisible by 8"
],
ans:0
},

{
q:"Divisibility rules are important in:",
opt:[
"Programming and mathematical analysis",
"Only drawing activities",
"Music operations",
"Sports management"
],
ans:0
}

];


/* =========================================================
   VARIABLES
========================================================= */

let index = 0;

let score = 0;

let questionTime = 30;

let totalTime = 300;

let questionTimer;

let overallTimer;


/* =========================================================
   LOAD QUESTION
========================================================= */

function loadQuestion(){

resetQuestionTimer();

document.getElementById(
"questionNumber"
).innerText =

`Question ${index + 1} / ${questions.length}`;

document.getElementById(
"questionText"
).innerText =

questions[index].q;

let html = "";

questions[index].opt.forEach((option,i)=>{

html += `

<div class='option'
     onclick='checkAnswer(${i})'>

     ${option}

</div>

`;

});

document.getElementById(
"options"
).innerHTML = html;

}


/* =========================================================
   CHECK ANSWER
========================================================= */

function checkAnswer(i){

if(i === questions[index].ans){

score += 4;

}

else{

score -= 1;

}

updateScore();

nextQuestion();

}


/* =========================================================
   NEXT QUESTION
========================================================= */

function nextQuestion(){

clearInterval(questionTimer);

index++;

if(index >= questions.length){

submitQuiz();

return;

}

loadQuestion();

}


/* =========================================================
   SKIP QUESTION
========================================================= */

function skipQuestion(){

nextQuestion();

}


/* =========================================================
   UPDATE SCORE
========================================================= */

function updateScore(){

document.getElementById(
"scoreBox"
).innerText = score;

}


/* =========================================================
   QUESTION TIMER
========================================================= */

function resetQuestionTimer(){

clearInterval(questionTimer);

questionTime = 30;

document.getElementById(
"questionTimer"
).innerText =
questionTime + "s";

document.getElementById(
"progressBar"
).style.animation =
"none";

void document.getElementById(
"progressBar"
).offsetWidth;

document.getElementById(
"progressBar"
).style.animation =
"progressMove 30s linear forwards";

questionTimer = setInterval(()=>{

questionTime--;

document.getElementById(
"questionTimer"
).innerText =
questionTime + "s";

if(questionTime <= 0){

nextQuestion();

}

},1000);

}


/* =========================================================
   OVERALL TIMER
========================================================= */

overallTimer = setInterval(()=>{

totalTime--;

document.getElementById(
"overallTimer"
).innerText =
totalTime + "s";

if(totalTime <= 0){

submitQuiz();

}

},1000);


/* =========================================================
   SUBMIT QUIZ
========================================================= */

function submitQuiz(){

clearInterval(questionTimer);

clearInterval(overallTimer);

let percentage =

(
(score / (questions.length * 4)) * 100
).toFixed(1);

document.querySelector(
".quiz-container"
).innerHTML = `

<div class='result-box'>

<h1>
Quiz Completed 🎉
</h1>

<h2>
Final Score : ${score}
</h2>

<h3>
Percentage : ${percentage}%
</h3>

<p>
Divisibility Rules performance
analysis completed successfully.
</p>

<button class='runtime-btn'
        onclick='saveScore()'>

Save Score & Continue →

</button>

</div>

`;

}


/* =========================================================
   SAVE SCORE
========================================================= */

function saveScore(){

let user =
JSON.parse(
localStorage.getItem(
"ActiveQuizzoneUser"
)
);

user.scores =
user.scores || {};

user.scores.chapter2topic5 = {

marks : score,

submitted : new Date()

};

localStorage.setItem(

"ActiveQuizzoneUser",

JSON.stringify(user)

);
window.location.href="/Quizzone/Disciplines/Mathematics/Quizes/Chapter%202/Topic6.htm";
autoNextQuiz();

}


/* =========================================================
   AUTO NEXT QUIZ
========================================================= */

function autoNextQuiz(){

const currentPath =
window.location.pathname;

const match =
currentPath.match(/Topic(\d+)/i);

if(!match){

location.href =
"/Quizzone/index.htm";

return;

}

const currentQuiz =
parseInt(match[1]);

const nextQuiz =
currentQuiz + 1;

const nextFile =
`Topic${nextQuiz}.htm`;

fetch(nextFile)

.then(res=>{

if(res.ok){

setTimeout(()=>{

location.href =
nextFile;

},3000);

}

else{

showCompletionPage();

}

})

.catch(()=>{

showCompletionPage();

});

}


/* =========================================================
   COMPLETION PAGE
========================================================= */

function showCompletionPage(){

document.body.innerHTML = `

<div style='
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(
135deg,
#007bff,
#00d4ff
);
color:white;
font-family:Poppins;
text-align:center;
padding:20px;
'>

<div>

<h1>
🎉
</h1>

<h2>
All Available Quizzes Completed
</h2>

<button onclick='goHome()'

style='
padding:14px 24px;
border:none;
border-radius:50px;
background:white;
color:#007bff;
font-weight:700;
cursor:pointer;
'>

Go To Home

</button>

</div>

</div>

`;

}


/* =========================================================
   GO HOME
========================================================= */

function goHome(){

location.href =
"/Quizzone/index.htm";

}


/* =========================================================
   PAGE VALIDATION
========================================================= */

fetch(window.location.href)

.then(res=>{

if(!res.ok){

location.href =
"/Quizzone/404.html";

}

})

.catch(()=>{

location.href =
"/Quizzone/404.html";

});


/* =========================================================
   INITIALIZE QUIZ
========================================================= */

loadQuestion();

</script>

</body>
</html>
